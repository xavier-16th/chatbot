<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Chats</h2>
      <button onclick="newChat()">+ New</button>
    </div>
    <div class="session-list" id="sessionList">
      <div class="no-sessions">No conversations yet</div>
    </div>
  </div>

  <!-- Main chat -->
  <div class="main">
    <div class="chat-header">
      <h1>Apex Motors - GR86</h1>
    </div>

    <div class="messages" id="messages">
      <div class="message assistant" id="greeting">yoo its pluto ya . You looking at cars today? cause i found some crazy 4 u 👀</div>
      <div class="typing-indicator" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="Type a message…"
        onkeydown="handleKey(event)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
