<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f4f8;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #6e48aa, #9d50bb);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h1 { font-size: 1.15rem; font-weight: 600; }
    .chat-header button {
      background: rgba(255,255,255,.2);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      transition: background .2s;
    }
    .chat-header button:hover { background: rgba(255,255,255,.35); }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: .95rem;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.user {
      align-self: flex-end;
      background: #6e48aa;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: #f0eef6;
      color: #333;
      border-bottom-left-radius: 4px;
    }
    .message.error {
      align-self: center;
      background: #ffe0e0;
      color: #a00;
      font-size: .85rem;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 12px 16px;
      background: #f0eef6;
      border-radius: 16px;
      display: none;
    }
    .typing-indicator span {
      display: inline-block;
      width: 8px; height: 8px;
      margin: 0 2px;
      background: #9d50bb;
      border-radius: 50%;
      animation: bounce .6s infinite alternate;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { to { transform: translateY(-6px); opacity: .4; } }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }
    .input-area textarea {
      flex: 1;
      resize: none;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      max-height: 120px;
    }
    .input-area textarea:focus { border-color: #6e48aa; }
    .input-area button {
      background: #6e48aa;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }
    .input-area button:hover { background: #5a3d8a; }
    .input-area button:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>Apex Motors - GR86</h1>
      <button onclick="resetChat()">New Chat</button>
    </div>

    <div class="messages" id="messages">
      <div class="message assistant">Hey! I'm Jake from Apex Motors. You looking at cars today? Because let me tell you, I've got something special to show you... 👀</div>
      <div class="typing-indicator" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="Type a message…"
        onkeydown="handleKey(event)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const sessionId = crypto.randomUUID();
    const messagesEl = document.getElementById("messages");
    const typingEl = document.getElementById("typing");
    const inputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = inputEl.scrollHeight + "px";
    });

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      messagesEl.insertBefore(div, typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage(text, "user");
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      typingEl.style.display = "block";
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });
        const data = await res.json();
        if (res.ok) {
          addMessage(data.reply, "assistant");
        } else {
          addMessage(data.error || "Something went wrong.", "error");
        }
      } catch {
        addMessage("Could not reach the server.", "error");
      } finally {
        typingEl.style.display = "none";
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function resetChat() {
      await fetch("/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId }),
      });
      // Clear UI
      document.querySelectorAll(".message").forEach(m => m.remove());
      addMessage("Hey! I'm Jake from Apex Motors. You looking at cars today? Because let me tell you, I've got something special to show you... 👀", "assistant");
    }
  </script>
</body>
</html>
